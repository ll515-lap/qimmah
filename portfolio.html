<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معرض الأعمال – قِمّة | Qimmah</title>

<style>

body {
    font-family: "Cairo", sans-serif;
    background-color: #c8bcb8;
    text-align: center;
    margin: 0;
}

/* عنوان */
h2 {
    font-size: 28px;
}

/* فلتر */
.filter-buttons button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #d8d3c4;
}

/* الشبكة */
.portfolio-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* العنصر */
.portfolio-item {
    background: #fff;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.portfolio-item:hover {
    transform: scale(1.04);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* الصورة */
.portfolio-item img {
    width: 100%;
    border-radius: 10px;
}

/* زر */
.order-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: black;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
}

/* مودال */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.8);
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 25px;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<h2>🔥 معرض أعمال قِمّة</h2>

<!-- فلترة -->
<div class="filter-buttons">
<button onclick="filter('all')">الكل</button>
<button onclick="filter('logo')">لوقو</button>
<button onclick="filter('ppt')">عروض</button>
<button onclick="filter('video')">مونتاج</button>
</div>

<div class="portfolio-container">

<div class="portfolio-item" data-type="logo">
<img src="logo2.png" onclick="openModal(this.src)">
<p>تصميم لوقو احترافي</p>
<a href="https://wa.me/966537439959" class="order-btn">اطلب</a>
</div>

<div class="portfolio-item" data-type="ppt">
<img src="rr.png" onclick="openModal(this.src)">
<p>عرض تقديمي</p>
<a href="https://wa.me/966537439959" class="order-btn">اطلب</a>
</div>

</div>

<!-- مودال -->
<div id="modal" class="modal">
<span class="close" onclick="closeModal()">×</span>
<img id="modal-img">
</div>

<script>

function filter(type){
let items = document.querySelectorAll(".portfolio-item");

items.forEach(item=>{
item.style.display = (type === "all" || item.dataset.type === type)
? "block" : "none";
});
}

function openModal(src){
document.getElementById("modal").style.display = "flex";
document.getElementById("modal-img").src = src;
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
